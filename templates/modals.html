<!-- Modals -->
<div id="modal-diario"
    class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
    <div class="bg-slate-950 border border-cyan-500/50 max-w-lg w-full p-6 neon-box-cyan relative">
        <div class="absolute top-0 left-0 w-2 h-2 border-t border-l border-cyan-400"></div>
        <div class="absolute top-0 right-0 w-2 h-2 border-t border-r border-cyan-400"></div>
        <div class="absolute bottom-0 left-0 w-2 h-2 border-b border-l border-cyan-400"></div>
        <div class="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-cyan-400"></div>

        <h3 class="text-lg font-mono font-bold text-cyan-400 mb-1 tracking-widest uppercase">Transmissão de Dados</h3>
        <p id="modal-target-mission"
            class="text-[10px] font-mono text-cyan-600 mb-6 uppercase tracking-widest border-b border-cyan-900/50 pb-2">
        </p>

        <div class="space-y-5">
            <div>
                <label class="block text-xs font-mono font-bold text-cyan-500 mb-1 uppercase tracking-wide">>> Relatório
                    Integral da Missão (Atividade em si)</label>
                <textarea id="form-activity"
                    class="w-full bg-black/80 border border-cyan-800 p-3 text-sm text-cyan-100 h-24 focus:outline-none focus:border-cyan-400 focus:shadow-[0_0_15px_rgba(34,211,238,0.3)] font-mono transition-colors"
                    placeholder="Descreva os passos e a atividade que executou..."></textarea>
            </div>
            <div>
                <label class="block text-xs font-mono font-bold text-cyan-500 mb-1 uppercase tracking-wide">>> Relatório
                    de Inteligência (Aprendizado)</label>
                <textarea id="form-learned"
                    class="w-full bg-black/80 border border-cyan-800 p-2 text-sm text-cyan-100 h-16 focus:outline-none focus:border-cyan-400 focus:shadow-[0_0_15px_rgba(34,211,238,0.3)] font-mono transition-colors"></textarea>
            </div>
            <div>
                <label class="block text-[11px] font-mono font-bold text-cyan-500 mb-1 uppercase tracking-wide">>>
                    Anomalias Detectadas (Dúvidas)</label>
                <textarea id="form-not-understood"
                    class="w-full bg-black border border-cyan-900 p-2 text-sm text-cyan-100 h-20 focus:outline-none focus:border-cyan-400 focus:shadow-[0_0_10px_rgba(34,211,238,0.2)] font-mono transition-colors"></textarea>
            </div>
            <div>
                <label class="block text-[11px] font-mono font-bold text-cyan-500 mb-1 uppercase tracking-wide">>>
                    Vetores de Expansão (O que explorar mais)</label>
                <textarea id="form-explore-more"
                    class="w-full bg-black border border-cyan-900 p-2 text-sm text-cyan-100 h-20 focus:outline-none focus:border-cyan-400 focus:shadow-[0_0_10px_rgba(34,211,238,0.2)] font-mono transition-colors"></textarea>
            </div>
        </div>

        <div class="flex justify-end gap-4 mt-8">
            <button onclick="closeDiario()"
                class="flex-1 bg-black border border-slate-700 text-slate-500 hover:bg-slate-900 hover:text-slate-300 font-mono font-bold py-3 transition-colors uppercase tracking-widest text-xs">
                Abortar
            </button>
            <button id="btn-submit-diario" onclick="submitDiario()"
                class="flex-1 bg-cyan-950 border border-cyan-500 text-cyan-400 hover:bg-cyan-500 hover:text-black font-mono font-bold py-3 transition-colors uppercase tracking-widest text-xs">
                Transmissão Criptografada
            </button>
        </div>
    </div>
</div>

<div id="modal-side"
    class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
    <div class="bg-slate-950 border border-fuchsia-500/50 max-w-lg w-full p-6 neon-box-fuchsia relative">
        <div class="absolute top-0 left-0 w-2 h-2 border-t border-l border-fuchsia-400"></div>
        <div class="absolute top-0 right-0 w-2 h-2 border-t border-r border-fuchsia-400"></div>
        <div class="absolute bottom-0 left-0 w-2 h-2 border-b border-l border-fuchsia-400"></div>
        <div class="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-fuchsia-400"></div>

        <h3 class="text-lg font-mono font-bold text-fuchsia-400 mb-1 tracking-widest uppercase">Decodificação Opcional
        </h3>
        <p id="modal-side-title"
            class="text-[10px] font-mono text-fuchsia-700 mb-6 uppercase tracking-widest border-b border-fuchsia-900/50 pb-2">
        </p>

        <div class="space-y-4">
            <div>
                <label class="block text-[11px] font-mono font-bold text-fuchsia-500 mb-1 uppercase tracking-wide">>>
                    Dados Interceptados (Anotações):</label>
                <textarea id="form-side-text"
                    class="w-full bg-black border border-fuchsia-900 p-2 text-sm text-fuchsia-100 h-40 focus:outline-none focus:border-fuchsia-400 focus:shadow-[0_0_10px_rgba(232,121,249,0.2)] font-mono transition-colors placeholder-fuchsia-900/50"
                    placeholder="Insira os dados coletados..."></textarea>
            </div>
        </div>

        <div class="flex justify-end gap-4 mt-8">
            <button onclick="closeSideQuest()"
                class="px-4 py-2 text-[11px] font-mono font-bold uppercase tracking-widest text-slate-500 hover:text-fuchsia-400 transition-colors">Abortar</button>
            <button onclick="submitSideQuest()"
                class="px-6 py-2 bg-fuchsia-950 border border-fuchsia-500 text-fuchsia-400 hover:bg-fuchsia-500 hover:text-black font-mono text-[11px] font-bold uppercase tracking-widest transition-all shadow-[0_0_10px_rgba(232,121,249,0.2)]">Processar</button>
        </div>
    </div>
</div>
