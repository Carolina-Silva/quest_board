<!-- Modals -->
<div id="modal-diario" class="modal-overlay hidden">
    <div class="modal-box modal-box-cyan">
        <div class="corner-tl"></div>
        <div class="corner-tr"></div>
        <div class="corner-bl"></div>
        <div class="corner-br"></div>

        <div style="flex-shrink:0;">
            <h3 class="modal-title modal-title-cyan">Transmissão de Dados</h3>
            <p id="modal-target-mission" class="modal-subtitle modal-subtitle-cyan"></p>
        </div>

        <div class="modal-scroll">
            <div id="modal-mission-instructions" class="modal-instructions modal-instructions-cyan">
                <!-- Instructions rendered via JS -->
            </div>

            <div class="modal-fields">
                <div>
                    <label class="modal-label modal-label-cyan">>> Relatório Integral da Missão</label>
                    <textarea id="form-activity" class="modal-textarea" style="height:112px;"
                        placeholder="Descreva os passos e a atividade que executou..."></textarea>
                </div>
                <div>
                    <label class="modal-label modal-label-cyan">>> Relatório de Inteligência (Aprendizado)</label>
                    <textarea id="form-learned" class="modal-textarea" style="height:64px;"></textarea>
                </div>
                <div>
                    <label class="modal-label modal-label-cyan">>> Anomalias Detectadas (Dúvidas)</label>
                    <textarea id="form-not-understood" class="modal-textarea"
                        style="height:64px;border-color:#164e63;"></textarea>
                </div>
                <div>
                    <label class="modal-label modal-label-cyan">>> Vetores de Expansão</label>
                    <textarea id="form-explore-more" class="modal-textarea"
                        style="height:64px;border-color:#164e63;"></textarea>
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <button onclick="closeDiario()" class="btn-modal-cancel">Abortar</button>
            <button id="btn-submit-diario" onclick="submitDiario()" class="btn-modal-submit btn-modal-submit-cyan">
                Transmissão Criptografada
            </button>
        </div>
    </div>
</div>

<div id="modal-side" class="modal-overlay hidden">
    <div class="modal-box modal-box-fuchsia">
        <div
            style="position:absolute;top:0;left:0;width:8px;height:8px;border-top:1px solid #e879f9;border-left:1px solid #e879f9;">
        </div>
        <div
            style="position:absolute;top:0;right:0;width:8px;height:8px;border-top:1px solid #e879f9;border-right:1px solid #e879f9;">
        </div>
        <div
            style="position:absolute;bottom:0;left:0;width:8px;height:8px;border-bottom:1px solid #e879f9;border-left:1px solid #e879f9;">
        </div>
        <div
            style="position:absolute;bottom:0;right:0;width:8px;height:8px;border-bottom:1px solid #e879f9;border-right:1px solid #e879f9;">
        </div>

        <div style="flex-shrink:0;">
            <h3 class="modal-title modal-title-fuchsia">Decodificação Opcional</h3>
            <p id="modal-side-title" class="modal-subtitle modal-subtitle-fuchsia"></p>
        </div>

        <div class="modal-scroll">
            <div id="modal-side-instructions" class="modal-instructions modal-instructions-fuchsia">
                <!-- Instructions rendered via JS -->
            </div>

            <div class="modal-fields">
                <div>
                    <label class="modal-label modal-label-fuchsia">>> Dados Interceptados (Anotações):</label>
                    <textarea id="form-side-text" class="modal-textarea modal-textarea-fuchsia" style="height:128px;"
                        placeholder="Insira os dados coletados..."></textarea>
                </div>
            </div>
        </div>

        <div class="modal-footer modal-footer-fuchsia">
            <button onclick="closeSideQuest()" class="btn-modal-cancel">Abortar</button>
            <button onclick="submitSideQuest()" class="btn-modal-submit btn-modal-submit-fuchsia">Processar</button>
        </div>
    </div>
</div>
