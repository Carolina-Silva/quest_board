<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incolagen - Acesso Restrito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Neon glowing effects */
        .neon-text-cyan { text-shadow: 0 0 8px rgba(34,211,238,0.8); }
        .neon-text-fuchsia { text-shadow: 0 0 8px rgba(232,121,249,0.8); }
        .neon-box-cyan { box-shadow: 0 0 15px rgba(34,211,238,0.3), inset 0 0 10px rgba(34,211,238,0.1); }
        .neon-box-fuchsia { box-shadow: 0 0 15px rgba(232,121,249,0.2), inset 0 0 10px rgba(232,121,249,0.05); }
        
        /* Scanline effect for background */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            opacity: 0.4;
        }
    </style>
</head>
<body class="bg-black text-slate-300 min-h-screen font-sans pb-12 relative overflow-x-hidden">
    
    {% include 'welcome.html' %}
    {% include 'board.html' %}
    {% include 'modals.html' %}

    <script src="/static/app.js"></script>
</body>
</html>
