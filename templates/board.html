<!-- Main Board -->
<div id="main-board" class="hidden">
    <header class="board-header">
        <div>
            <h1 id="board-title" class="board-title glitch-hover">CORE</h1>
            <p class="board-subtitle">Painel de Operações</p>
        </div>
        <div class="header-right">
            <div class="progress-mini-wrap">
                <span class="progress-mini-label">Seu Progresso</span>
                <div class="progress-mini-bar-bg">
                    <div id="progress-bar" class="progress-bar-fill" style="width:0%"></div>
                </div>
            </div>
            <div class="level-badge neon-box-cyan">
                <span class="level-label">Nível Atual</span>
                <span id="player-level" class="level-value glitch-hover">LVL 01</span>
            </div>
            <button onclick="logout()" class="btn-logout">Sair</button>
        </div>
    </header>

    <!-- Tab Navigation -->
    <div class="tabs">
        <button id="tab-main" onclick="switchTab('main')" class="tab-btn active">
            Missões Principais
        </button>
        <button id="tab-side" onclick="switchTab('side')" class="tab-btn inactive">
            Missões Extras
        </button>
    </div>

    <!-- Main Quests Tab -->
    <div id="content-main" class="tab-content visible">

        <!-- Badges -->
        <div id="badges-container" class="badges-container" style="margin-bottom:24px;">
            <!-- Emblemas via JS -->
        </div>

        <!-- Squad Goal Section -->
        <div class="squad-box" style="margin-bottom:24px;">
            <h2 class="squad-title">
                <span><span class="animate-pulse">>></span> Time</span>
                <span id="team-goal-text" class="squad-goal-text">Progresso do time: 0%</span>
            </h2>
            <div class="team-progress-bg">
                <div id="team-progress-bar" class="team-progress-fill" style="width:0%"></div>
            </div>
            <div class="team-players-grid" id="team-players-list">
                <!-- Loaded via JS -->
            </div>
            <div id="team-bonus-message" class="team-bonus hidden">
                <span>★ SISTEMA PRINCIPAL DESBLOQUEADO ★</span>
                TIME COMPLETO! TODAS CONCLUÍRAM A TRILHA!
            </div>
        </div>

        <div class="section-header-cyan">
            <span class="animate-pulse">_</span> Suas Missões
        </div>

        <div id="main-quests-container" class="quest-cards-stack">
            <!-- Missões renderizadas via JS -->
        </div>
    </div>

    <!-- Side Quests Tab -->
    <div id="content-side" class="tab-content hidden">
        <div class="section-header-fuchsia">
            <span class="animate-pulse">_</span> Missões Extras
        </div>

        <div id="side-quests-container" class="side-cards-stack">
            <!-- Side quests renderizadas via JS -->
        </div>

        <div class="logs-box" style="margin-top:24px;">
            <h3 class="logs-box-title">Histórico de Envios</h3>
            <div id="logs-history" class="logs-list"></div>
        </div>
    </div>
</div>
