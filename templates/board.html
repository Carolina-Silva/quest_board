<!-- Main Board -->
<div id="main-board" class="hidden max-w-6xl mx-auto px-4 pt-8 relative z-10">
    <header
        class="border-b border-cyan-900/50 pb-6 mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 id="board-title"
                class="text-3xl md:text-4xl font-mono font-bold text-cyan-400 tracking-widest uppercase neon-text-cyan glitch-hover">
                INCOLAGEN_CORE</h1>
            <p class="text-slate-500 mt-1 font-mono text-sm uppercase tracking-wider">Painel de Operações / Estágio
                Tático</p>
        </div>
        <div class="flex items-center gap-4 w-full md:w-auto">
            <div class="bg-black border border-cyan-900/50 px-4 py-2 flex-1 md:flex-initial relative">
                <span class="text-xs text-cyan-500/70 block font-mono uppercase tracking-widest mb-2">Progresso do
                    Sistema</span>
                <div class="w-32 bg-slate-900 h-2 overflow-hidden border border-cyan-900">
                    <div id="progress-bar"
                        class="bg-cyan-400 h-full transition-all duration-700 ease-out shadow-[0_0_15px_rgba(34,211,238,1)]"
                        style="width: 0%"></div>
                </div>
            </div>
            <div class="bg-cyan-950/20 border border-cyan-500/50 px-4 py-2 text-center neon-box-cyan">
                <span class="text-xs text-cyan-500/70 block font-mono uppercase tracking-widest">Nível de Acesso</span>
                <span id="player-level"
                    class="text-xl font-mono font-bold text-cyan-400 neon-text-cyan glitch-hover">LVL 01</span>
            </div>
            <button onclick="logout()"
                class="bg-red-950/40 border border-red-500/50 px-4 py-3 text-red-400 hover:bg-red-500 hover:text-black transition-colors font-mono text-xs uppercase tracking-widest font-bold h-full">
                Sair
            </button>
        </div>
    </header>

    <!-- Tab Navigation -->
    <div class="flex gap-2 border-b border-cyan-900/50 mb-6 font-mono">
        <button id="tab-main" onclick="switchTab('main')"
            class="bg-cyan-950 text-cyan-400 px-6 py-3 border-t border-l border-r border-cyan-500 font-bold uppercase tracking-widest text-sm shadow-[0_0_15px_rgba(34,211,238,0.2)] transition-all">
            Operações Principais
        </button>
        <button id="tab-side" onclick="switchTab('side')"
            class="bg-black text-slate-500 px-6 py-3 border-t border-l border-r border-slate-800 hover:text-cyan-400 uppercase tracking-widest text-sm font-bold transition-all">
            Protocolos Opcionais
        </button>
    </div>

    <!-- Main Quests Tab -->
    <div id="content-main" class="space-y-6 max-w-4xl mx-auto">
        <!-- Badges (Condecorações) -->
        <div id="badges-container"
            class="bg-black/80 p-4 border border-fuchsia-900/50 flex flex-wrap gap-4 items-center">
            <!-- Emblemas via JS -->
        </div>

        <!-- Squad Goal Section -->
        <div class="bg-black/60 p-4 border border-cyan-800 relative shadow-inner">
            <h2
                class="text-sm font-mono font-bold text-cyan-500 uppercase tracking-widest mb-3 flex items-center justify-between">
                <span><span class="animate-pulse">>></span> Esquadrão Ativo</span>
                <span id="team-goal-text" class="text-cyan-600 text-xs">META: 0%</span>
            </h2>

            <div class="relative pt-1 mb-4">
                <div class="flex h-2 overflow-hidden bg-slate-900 border border-cyan-900">
                    <div id="team-progress-bar"
                        class="flex flex-col justify-center text-center text-white bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.8)] transition-all duration-700"
                        style="width: 0%"></div>
                </div>
            </div>

            <div id="team-players-list" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
                <!-- Loaded via JS -->
            </div>
            <div id="team-bonus-message"
                class="hidden mt-4 p-3 bg-emerald-950/40 border border-emerald-500/50 text-emerald-400 font-mono text-xs font-bold uppercase tracking-widest text-center animate-pulse">
                <span class="block mb-1 text-emerald-300">★ SISTEMA PRINCIPAL DESBLOQUEADO ★</span>
                META GLOBAL ATINGIDA!
            </div>
        </div>

        <h2
            class="text-sm font-mono font-bold text-cyan-500 flex items-center gap-2 tracking-widest uppercase border-l-2 border-cyan-500 pl-2">
            <span class="animate-pulse">_</span> Diretrizes Principais
        </h2>

        <div id="main-quests-container" class="space-y-6">
            <!-- Missões renderizadas via JS -->
        </div>
    </div>

    <!-- Side Quests Tab -->
    <div id="content-side" class="hidden space-y-6 max-w-4xl mx-auto">
        <h2
            class="text-base font-mono font-bold text-fuchsia-400 flex items-center gap-2 tracking-widest uppercase border-l-2 border-fuchsia-500 pl-2 glitch-hover">
            <span class="animate-pulse">_</span> Protocolos Opcionais
        </h2>

        <div id="side-quests-container" class="space-y-6">
            <!-- Side quests renderizadas via JS -->
        </div>

        <div
            class="bg-black/80 p-5 pl-6 border border-cyan-900/40 relative before:absolute before:top-0 before:left-0 before:w-full before:h-[2px] before:bg-gradient-to-r before:from-cyan-500/0 before:via-cyan-500/80 before:to-cyan-500/0 outline outline-1 outline-cyan-950">
            <h3 class="text-xs font-mono font-bold text-cyan-500 uppercase tracking-widest mb-4">Logs de Operação</h3>
            <div id="logs-history"
                class="space-y-4 max-h-72 overflow-y-auto pr-2 text-sm text-slate-300 font-mono scrollbar-thin scrollbar-thumb-cyan-700 scrollbar-track-black">
            </div>
        </div>
    </div>
</div>
