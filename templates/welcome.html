<div id="welcome-screen" class="hidden min-h-[90vh] flex flex-col items-center justify-center p-4 relative z-10">

        class="max-w-md w-full bg-slate-950/80 p-8 border border-cyan-500/40 text-center neon-box-cyan backdrop-blur-sm">
        <h1 class="text-4xl font-mono font-bold text-cyan-400 mb-2 tracking-[0.2em] neon-text-cyan uppercase">Terminal_
        </h1>
        <h2 class="text-lg font-mono text-slate-400 mb-8 tracking-widest border-b border-cyan-900/50 pb-2">Equipe de

            <button onclick="acceptMission()"
